# Dev-only overrides: expose DB/Redis and admin UIs on localhost.
# Automatically loaded by `docker compose up`.

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  redisinsight:
    ports:
      - "${REDISINSIGHT_PORT:-5540}:5540"

  pgadmin:
    ports:
      - "${PGADMIN_PORT:-5050}:80"
